version: '3.8'

services:
  # Vector Database Service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag-network

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/workspace/data
      - ./backend/.env:/workspace/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GORQ_API_KEY=${GORQ_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - rag-network

  # Streamlit Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend-app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  qdrant_storage:

networks:
  rag-network:
    driver: bridge
