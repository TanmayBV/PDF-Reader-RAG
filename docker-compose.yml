version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/workspace/data
      - faiss_storage:/workspace/faiss_store
      - ./.env:/workspace/.env
    environment:
      - FAISS_STORE_PATH=/workspace/faiss_store
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GORQ_API_KEY=${GORQ_API_KEY}
      - TESSERACT_CMD=/usr/bin/tesseract
    restart: unless-stopped
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend-app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  faiss_storage:

networks:
  rag-network:
    driver: bridge
